paper:
  doi: https://doi.org/10.1257/aer.91.5.1369
  title: The Colonial Origins of Comparative Development
  journal: American Economic Review
  year: 2001
  authors: Daron Acemoglu, Simon Johnson, James A. Robinson
  materials: folder
  source_url: https://econ-www.mit.edu/faculty/acemoglu/data/ajr2001
  source_note: Original Stata code and data from MIT; R translations in code/tab_*.R
  dependencies:
    - haven
    - modelsummary
    - AER
    - knitr
    - lmtest

replications:
  - id: tab_1
    group: tab_1
    engine: r
    type: table
    label: Table 1
    description: Summary Statistics
    data: data/maketable1.dta
    code: code/tab_1.R
    format: format_tab_1
    artifact: artifacts/tab_1.html
    dependencies:
      - knitr

  - id: tab_1_stata
    group: tab_1
    engine: stata
    type: table
    label: Table 1
    description: Summary Statistics (original MIT Stata)
    data: data/maketable1.dta
    code: code/tab_1.do
    stata_source: code/maketable1.do
    format: code/format_stata.R
    output: artifacts/staging/tab_1_stata.log
    artifact: artifacts/tab_1_stata.html

